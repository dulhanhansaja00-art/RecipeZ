<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RECIPEZ</title>
  <link rel="stylesheet" href="css/styles.css?v=10">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    .login-info { font-size: 13px; color: #5a7a5a; background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
    .login-info b { color: #1b5e20; }
    .or-divider { text-align: center; color: #aaa; margin: 16px 0; font-size: 13px; position: relative; }
    .or-divider::before, .or-divider::after { content: ""; position: absolute; top: 50%; width: 42%; height: 1px; background: #e0e0e0; }
    .or-divider::before { left: 0; } .or-divider::after { right: 0; }
    .spinner { display: none; }
    .btn-primary.loading .spinner { display: inline; }
    .btn-primary.loading .btn-text { display: none; }
  </style>
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="logo">RECIPE<span>Z</span></div>
    <p class="tagline">Sign in to share and discover recipes</p>

    <!-- Success message (shown after register redirect) -->
    <div id="successMsg" style="display:none; background:#e8f5e9; border:1px solid #c8e6c9; border-radius:8px; padding:12px 16px; margin-bottom:16px; color:#2e7d32; font-size:14px;"></div>

    <!-- Username -->
    <div class="form-group">
      <label for="loginUser" style="font-size:14px; font-weight:600; color:#5a7a5a;">Username</label>
      <input type="text" id="loginUser" placeholder="Enter your username"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="loginPass" style="font-size:14px; font-weight:600; color:#5a7a5a;">Password</label>
      <div class="password-wrap">
        <input type="password" id="loginPass" placeholder="Enter your password"
               onkeydown="if(event.key==='Enter') doLogin()">
        <button class="toggle-pwd" id="togglePwdBtn" onclick="togglePassword()" type="button">👁</button>
      </div>
    </div>

    <div class="error-msg" id="loginError" style="margin-bottom:10px;"></div>

    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()" style="width:100%; font-size:17px; padding:16px; margin-top:4px;">
      <span class="spinner">⏳</span>
      <span class="btn-text">🔐 Login</span>
    </button>

    <div class="or-divider">or</div>

    <div style="text-align:center; margin:20px 0 10px;">
      <p style="color:#5a7a5a; font-size:14px; margin-bottom:10px;">Don't have an account?</p>
      <a href="register.html" class="btn btn-primary" style="width:100%; display:block; margin-bottom:10px;">
        ✍️ Sign Up / Register
      </a>
    </div>

    <a href="index.html" class="btn btn-outline" style="width:100%; text-align:center; display:block; color:#2e7d32; border-color:#2e7d32;">
      👀 Browse as Guest
    </a>

    <p style="text-align:center; margin-top:20px; font-size:13px; color:#888;">
      <a href="index.html" style="color:#2e7d32;">← Back to Home</a>
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js?v=10"></script>
<script>
// Show success message if coming from registration
const params = new URLSearchParams(window.location.search);
if (params.get('registered')) {
  const el = document.getElementById('successMsg');
  el.textContent = '✅ Account created! Please log in.';
  el.style.display = 'block';
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  errEl.classList.remove('show');

  if (!username) { errEl.textContent = '⚠️ Please enter your username.'; errEl.classList.add('show'); return; }
  if (!password) { errEl.textContent = '⚠️ Please enter your password.';  errEl.classList.add('show'); return; }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const result = await apiLogin(username, password);
    if (result.success) {
      // Store lightweight session info in sessionStorage for UI use
      sessionStorage.setItem('user', JSON.stringify(result.user));
      window.location.href = 'index.html';
    } else {
      errEl.textContent = '❌ ' + (result.error || 'Login failed.');
      errEl.classList.add('show');
      document.getElementById('loginPass').value = '';
    }
  } catch (e) {
    errEl.textContent = '❌ Could not reach server. Check your connection.';
    errEl.classList.add('show');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function togglePassword() {
  const inp = document.getElementById('loginPass');
  inp.type  = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
