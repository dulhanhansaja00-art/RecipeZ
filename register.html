<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | RECIPEZ</title>
  <link rel="stylesheet" href="css/styles.css?v=10">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    .strength-bar  { height:6px; border-radius:3px; background:#e0e0e0; margin-top:6px; overflow:hidden; }
    .strength-fill { height:100%; border-radius:3px; transition:width .3s,background .3s; width:0; }
    .strength-text { font-size:12px; margin-top:4px; font-weight:600; }
    .hint-item     { font-size:12px; color:#5a7a5a; margin-top:2px; }
    .hint-item.met   { color:#2e7d32; }
    .hint-item.unmet { color:#c62828; }
  </style>
</head>
<body>

<div class="login-page">
  <div class="login-card" style="max-width:460px;">

    <div class="logo">RECIPE<span>Z</span></div>
    <p class="tagline">Create your free account to share recipes</p>

    <!-- Username -->
    <div class="form-group">
      <label for="regUser" style="font-size:14px;font-weight:600;color:#5a7a5a;">Username</label>
      <input type="text" id="regUser" placeholder="e.g. CookingMaster"
             onkeydown="if(event.key==='Enter') doRegister()">
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="regEmail" style="font-size:14px;font-weight:600;color:#5a7a5a;">Email Address</label>
      <input type="email" id="regEmail" placeholder="you@example.com"
             onkeydown="if(event.key==='Enter') doRegister()">
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="regPass" style="font-size:14px;font-weight:600;color:#5a7a5a;">Password</label>
      <div class="password-wrap">
        <input type="password" id="regPass" placeholder="Create a strong password"
               oninput="checkStrength()">
        <button class="toggle-pwd" onclick="toggleRegPass()" type="button">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <p class="strength-text" id="strengthText" style="color:#5a7a5a;"></p>
      <div id="passHints">
        <div class="hint-item unmet" id="hint-len">✗ At least 8 characters</div>
        <div class="hint-item unmet" id="hint-upper">✗ One uppercase letter</div>
        <div class="hint-item unmet" id="hint-lower">✗ One lowercase letter</div>
        <div class="hint-item unmet" id="hint-num">✗ One number (0-9)</div>
        <div class="hint-item unmet" id="hint-spec">✗ One special character (!@#$)</div>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label for="regConfirm" style="font-size:14px;font-weight:600;color:#5a7a5a;">Confirm Password</label>
      <input type="password" id="regConfirm" placeholder="Re-enter your password"
             onkeydown="if(event.key==='Enter') doRegister()">
      <p id="matchMsg" style="font-size:12px;margin-top:4px;display:none;"></p>
    </div>

    <p id="regError" style="color:#c62828;font-size:13px;background:#fce4ec;border:1px solid #ef9a9a;border-radius:8px;padding:10px;margin-bottom:14px;display:none;"></p>

    <button class="btn btn-primary" id="regBtn" onclick="doRegister()" style="width:100%;padding:14px;font-size:16px;margin-bottom:12px;">
      Create Account
    </button>

    <div style="text-align:center;margin-top:12px;">
      <p style="color:#5a7a5a;font-size:14px;">
        Already have an account?
        <a href="login.html" style="color:#2e7d32;font-weight:600;text-decoration:none;">Sign In</a>
      </p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js?v=10"></script>
<script>
// Password strength checker (kept from original)
function checkStrength() {
  const pass  = document.getElementById('regPass').value;
  const rules = {
    len:   pass.length >= 8,
    upper: /[A-Z]/.test(pass),
    lower: /[a-z]/.test(pass),
    num:   /[0-9]/.test(pass),
    spec:  /[!@#$%^&*(),.?":{}|<>]/.test(pass),
  };
  let score = Object.values(rules).filter(Boolean).length;

  Object.entries(rules).forEach(([key, ok]) => {
    const el = document.getElementById('hint-' + key);
    if (!el) return;
    el.className = 'hint-item ' + (ok ? 'met' : 'unmet');
    el.textContent = (ok ? '✓ ' : '✗ ') + el.textContent.slice(2);
  });

  const fill = document.getElementById('strengthFill');
  const text = document.getElementById('strengthText');
  const colors = ['#e53935','#e53935','#fb8c00','#fdd835','#43a047'];
  const labels = ['','Weak','Fair','Good','Strong'];
  fill.style.width      = (score * 20) + '%';
  fill.style.background = colors[score];
  text.textContent      = labels[score] || '';
  text.style.color      = colors[score];
}

function toggleRegPass() {
  const inp = document.getElementById('regPass');
  inp.type  = inp.type === 'password' ? 'text' : 'password';
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value;
  const confirm  = document.getElementById('regConfirm').value;
  const errEl    = document.getElementById('regError');
  const btn      = document.getElementById('regBtn');

  errEl.style.display = 'none';

  // Client-side checks
  if (username.length < 3) { showErr('Username must be at least 3 characters.'); return; }
  if (!email.includes('@')) { showErr('Please enter a valid email address.');     return; }
  if (password.length < 8)  { showErr('Password must be at least 8 characters.'); return; }
  if (password !== confirm)  { showErr('Passwords do not match.');                 return; }

  btn.disabled    = true;
  btn.textContent = 'Creating account…';

  try {
    const result = await apiRegister(username, email, password);
    if (result.success) {
      window.location.href = 'login.html?registered=1';
    } else {
      showErr(result.error || 'Registration failed.');
    }
  } catch (e) {
    showErr('Could not reach server. Check your connection.');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Create Account';
  }

  function showErr(msg) {
    errEl.textContent   = '❌ ' + msg;
    errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
